<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE STORE</title>
</head>
<body style="margin:0; font-family: sans-serif; background-color: #f8f9fa;">

    <nav style="display:flex; justify-content:space-between; align-items:center; padding:15px 5%; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.1); position: sticky; top:0; z-index: 100;">
        <div style="font-size:22px; font-weight:bold;">VIBE STORE </div>
        <div style="display:flex; gap:20px;">
            <a href="index.html" style="text-decoration:none; color:#333;">Home</a>
            <a href="#product-section" style="text-decoration:none; color:#555;">Products</a>
            <a href="#" style="text-decoration:none; color:#555;">About</a>
        </div>
        <div style="display:flex; gap:10px; align-items: center;">
            <input type="text" id="search-input" placeholder="Search products..." style="padding:8px; border:1px solid #ddd; border-radius:4px;">
            <button id="search-btn" style="padding:8px; background:#000; color:#fff; border:none; cursor:pointer;">
           Search </button>
            <button id="login-btn" onclick="location.href='1-login.html'" style="padding:8px 15px; border:1px solid #333; background:none; cursor:pointer; border-radius:4px;">
            <i class="fa fa-sign-in"></i> Login
        </button>
        
        <button id="logout-btn" onclick="logoutUser()" style="padding:8px 15px; background:#000; color:#fff; border:none; cursor:pointer; border-radius:4px;">
            <i class="fa fa-sign-out"></i> Logout
        </button>
        
        <button onclick="location.href='5-cart.html'" style="padding:8px 15px; border:1px solid #333; background:none; cursor:pointer; border-radius:4px;">
            <i class="fa fa-shopping-cart"></i> Cart (0)
        </button>
        </div>
    </nav>

    <div style="width:100%; height:500px; background:url('https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg') no-repeat center/cover; display:flex; align-items:center; color:#fff; padding-left:10%;">
        <div style="background: rgba(0,0,0,0.1); padding: 20px;">
            <h1 style="font-size:55px; margin:0; font-weight: 300;">NEW SEASON ARRIVALS</h1>
            <p style="font-size:22px; letter-spacing:3px; margin-top:10px;">CHECK OUT ALL THE TRENDS</p>
        </div>
    </div>

    <div id="product-section" style="text-align:center; padding:60px 0;">
        <h2 style="font-size:40px; margin-bottom:10px; font-weight: 500;">Latest Products</h2>
        <hr style="width:85%; margin: 0 auto 40px; border: 0; border-top: 1px solid #eee;">
        <div id="product-container" style="display:flex; flex-wrap:wrap; justify-content:center; padding:0 5%; gap: 25px;">
            </div>
    </div>

    <script src="4-index.js"></script>
</body>
</html>
